services:
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8000:8000"
    depends_on:
      - ingestion-service
      - retrieval-service

  ingestion-service:
    build:
      context: ..
      dockerfile: services/ingestion-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8001:8001"
    volumes:
      - documents:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  embedding-service:
    build:
      context: ..
      dockerfile: services/embedding-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8002:8002"

  retrieval-service:
    build:
      context: ..
      dockerfile: services/retrieval-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_started
      llm-service:
        condition: service_started

  llm-service:
    build:
      context: ..
      dockerfile: services/llm-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8004:8004"

  processing-service:
    build:
      context: ..
      dockerfile: services/processing-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
      rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - ingestion-service
      - embedding-service
      - retrieval-service
      - llm-service
      - processing-service
      - rabbitmq

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  documents:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
