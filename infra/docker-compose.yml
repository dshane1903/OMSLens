services:
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8000:8000"
    depends_on:
      - ingestion-service
      - processing-service
      - retrieval-service

  ingestion-service:
    build:
      context: ..
      dockerfile: services/ingestion-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8001:8001"
    volumes:
      - documents:/data/documents
    depends_on:
      - postgres

  processing-service:
    build:
      context: ..
      dockerfile: services/processing-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8005:8005"
    depends_on:
      - postgres
      - embedding-service

  embedding-service:
    build:
      context: ..
      dockerfile: services/embedding-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8002:8002"

  retrieval-service:
    build:
      context: ..
      dockerfile: services/retrieval-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - embedding-service
      - llm-service

  llm-service:
    build:
      context: ..
      dockerfile: services/llm-service/Dockerfile
    env_file:
      - ../.env.example
    ports:
      - "8004:8004"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  documents:
  postgres_data:

