global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: omscs-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8000
          - ingestion-service:8001
          - embedding-service:8002
          - retrieval-service:8003
          - llm-service:8004
          - processing-service:8005

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692
